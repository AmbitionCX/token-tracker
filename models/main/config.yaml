# ============================================
# GNN Model Configuration
# ============================================

# Data Configuration
data:
  # PostgreSQL connection (inherited from .env)
  table_name: "tx_joined_4000000_4010000"
  start_block: 4000000
  end_block: 4010000
  chunk_size: 5000
  
  # Temporal window configuration
  window_size: 5000  # Δ = window_size blocks 

  # Data split (time-series split to avoid leakage)
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  
  # Mini-batch size in *edges* (transactions) per forward pass
  batch_size: 512

  # Cache configuration
  cache_enabled: true
  cache_dir: "./cache"

  # Train loader: oversample positives vs negatives at edge level (inverse class frequency)
  train_edge_balance: true

# Feature Engineering
features:
  # External transaction features
  external:
    - value
    - gas_used
    - calldata_length
    - is_contract_call
    - is_revert
    - nonce_position
  
  # Trace features
  trace:
    max_sequence_length: 256
    embedding_dim: 128
    
  # Dimensions
  external_dim: 4       # External features: value, gas_used, calldata_len, is_revert
  trace_dim: 128
  total_edge_dim: 134   # 6 external + 128 trace

# Model Configuration
model:
  # Trace Encoder
  trace_encoder:
    type: "transformer"  # Options: transformer, lstm, pooling
    hidden_dim: 128
    num_layers: 2
    num_heads: 4  # For transformer
    dropout: 0.1
    activation: "relu"
  
  # GNN Module
  gnn:
    type: "gat"  # Options: gat, gcn, graphsage
    num_layers: 2
    hidden_dim: 128
    edge_dim: 135  # Edge features dimension
    dropout: 0.1
    num_heads: 4  # For GAT
  
  # Attention Aggregator
  attention:
    hidden_dim: 64
    num_heads: 4
  
  # Final classifier
  classifier:
    hidden_dim: 64
    num_classes: 2  # Binary: suspicious / normal

# Training Configuration
training:
  device: "cuda"  # Options: cuda, cpu
  batch_size: 512  # edges per batch (see data.batch_size)
  num_epochs: 10
  learning_rate: 0.001
  weight_decay: 1e-5
  
  # Loss function (imbalanced positives vs negatives)
  loss_fn: "weighted_crossentropy"  # crossentropy | weighted_crossentropy | focal
  positive_weight: 25.0  # CE / focal class weight for class 1 (suspicious); raise if positives are still missed (try 50–100)
  focal_gamma: 2.0     # used when loss_fn is focal (focus on hard examples)
  label_smoothing: 0.0     # optional 0.05 to stabilize; keep 0 for rare-positive focus
  
  # Best checkpoint: macro_f1 balances both classes on imbalanced data (avoid "all negative" optimum)
  early_stopping_metric: "macro_f1"  # or "f1" (positive F1), "loss"
  
  # Optimizer
  optimizer: "adam"
  
  # Scheduler
  scheduler:
    type: "cosine"
    warmup_steps: 500
    total_steps: -1  # Will be computed based on data
  
  # Callbacks
  early_stopping:
    patience: 10
    min_delta: 1e-4
    
  checkpoint:
    save_dir: "./checkpoints"
    save_freq: 5  # Every N epochs
    keep_best: true

# Evaluation Metrics
metrics:
  - accuracy
  - precision
  - recall
  - f1
  - auc
  - confusion_matrix

# Baseline Models Configuration
baselines:
  traditional:
    - logistic_regression
    - random_forest
    - xgboost
  
  graph_only:
    - gcn
    - graphsage
    - gat
  
  sequence_only:
    - rnn
    - transformer

# Ablation Experiments
ablations:
  exp_a:
    name: "No Trace Features"
    trace_enabled: false
    gnn_enabled: true
    attention_enabled: true
  
  exp_b:
    name: "No GNN (Direct Classification)"
    trace_enabled: true
    gnn_enabled: false
    attention_enabled: true
  
  exp_c:
    name: "No Attention (Simple Concatenation)"
    trace_enabled: true
    gnn_enabled: true
    attention_enabled: false
  
  exp_d:
    name: "Different TraceEncoders"
    trace_encoder_types:
      - transformer
      - lstm
      - pooling
    gnn_enabled: true
    attention_enabled: true

# Logging and Logging Configuration
logging:
  level: "INFO"
  log_dir: "./logs"
  log_file: "train.log"
  tensorboard_dir: "./runs"
  log_freq: 100  # Log every N steps

# Random Seeds for Reproducibility
random_seed: 42
